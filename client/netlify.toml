[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to your actual deployed backend server
[[redirects]]
  from = "/api/*"
  to = "https://syncstream-api-0vns.onrender.com/api/:splat"
  status = 200

# Proxy Socket.io connections
[[redirects]]
  from = "/socket.io/*"
  to = "https://syncstream-api-0vns.onrender.com/socket.io/:splat"
  status = 200

# Catch-all redirect for React Router (must be at the bottom)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
